services:
  - type: web
    name: docmind-rag
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PORT
        value: "10000"
